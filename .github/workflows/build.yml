name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  XCODE_VERSION: "15.3"

jobs:
  build:
    name: Build (Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-14
            xcode: "15.3"
          - runs-on: macos-13
            xcode: "15.3"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Select Xcode ──────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app && xcodebuild -version

      # ── 3. Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          brew install xcodegen
          brew install ffmpeg
          brew install pkg-config
          brew install libass
          xcodegen --version
          echo "=== FFmpeg ==="
          ls /opt/homebrew/include/ 2>/dev/null | head -5 || ls /usr/local/include/ 2>/dev/null | head -5
          echo "=== libass ==="
          ls /opt/homebrew/include/ass/ 2>/dev/null || ls /usr/local/include/ass/ 2>/dev/null

      # ── 4. Generate Xcode project ────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate

      # ── 5. Build ─────────────────────────────────────────────────
      - name: Build
        run: |
          xcodebuild \
            -project MacPotPlayer.xcodeproj \
            -scheme MacPotPlayer \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$(brew --prefix)/include" \
            LIBRARY_SEARCH_PATHS="$(brew --prefix)/lib" \
            SWIFT_INCLUDE_PATHS="$(brew --prefix)/include" \
            2>&1 | tee build.log

      # ── 6. Upload build log on failure ───────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.runs-on }}
          path: build.log
          retention-days: 7

      # ── 7. Upload .app as artifact ───────────────────────────────
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacPotPlayer-Build-${{ matrix.runs-on == 'macos-14' && 'AppleSilicon' || 'Intel' }}
          path: build/Debug/MacPotPlayer.app
          retention-days: 7
