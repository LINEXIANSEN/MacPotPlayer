name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  XCODE_VERSION: "15.3"

jobs:
  build:
    name: Build (Xcode 15.3)
    runs-on: macos-14

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Select Xcode ──────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.3.app && xcodebuild -version

      # ── 3. Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          brew install xcodegen
          brew install ffmpeg
          brew install libass
          echo "=== FFmpeg ==="
          ls $(brew --prefix)/include/libavcodec/
          echo "=== libass ==="
          ls $(brew --prefix)/include/ass/

      # ── 4. Generate Xcode project ────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate

      # ── 5. Build ─────────────────────────────────────────────────
      - name: Build
        run: |
          xcodebuild \
            -project MacPotPlayer.xcodeproj \
            -scheme MacPotPlayer \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$(brew --prefix)/include" \
            LIBRARY_SEARCH_PATHS="$(brew --prefix)/lib" \
            SWIFT_INCLUDE_PATHS="$(brew --prefix)/include" \
            OTHER_LDFLAGS="-lavcodec -lavformat -lavutil -lswscale -lswresample -lass -lpthread" \
            2>&1 | tee build.log

      # ── 6. Find and show built .app ──────────────────────────────
      - name: Find built app debug
        run: |
          echo "=== Searching for .app files ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== Build directory contents ==="
          ls -la build/ 2>/dev/null || echo "No build/"
          ls -la build/Build/Products/ 2>/dev/null || echo "No build/Build/Products/"

      # ── 7. Upload build log on failure ───────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 8. Upload .app as artifact ───────────────────────────────
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacPotPlayer-Build
          path: build/Build/Products/Debug/MacPotPlayer.app
          retention-days: 7
