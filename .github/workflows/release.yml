name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  XCODE_VERSION: "15.3"

jobs:
  release:
    name: Release Build & Package
    runs-on: macos-14

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Export version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ── 2. Select Xcode ──────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.3.app
          xcodebuild -version

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          brew install xcodegen
          brew install ffmpeg
          brew install libass
          echo "=== FFmpeg ==="
          ls $(brew --prefix)/include/libavcodec/
          echo "=== libass ==="
          ls $(brew --prefix)/include/ass/

      # ── 4. Patch Info.plist with version ─────────────────────────
      - name: Patch version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" Resources/Info.plist

      # ── 5. Generate Xcode project ────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate

      # ── 6. Build Release ─────────────────────────────────────────
      - name: Build Release
        id: build
        run: |
          xcodebuild \
            -project MacPotPlayer.xcodeproj \
            -scheme MacPotPlayer \
            -configuration Release \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$(brew --prefix)/include" \
            LIBRARY_SEARCH_PATHS="$(brew --prefix)/lib" \
            SWIFT_INCLUDE_PATHS="$(brew --prefix)/include" \
            OTHER_LDFLAGS="-lavcodec -lavformat -lavutil -lswscale -lswresample -lass -lpthread" \
            2>&1 | tee build.log
          
          # 输出构建产物位置
          echo "=== Build Products ==="
          ls -la MacPotPlayer.build/
          find . -name "*.app" -type d 2>/dev/null

      # ── 7. Upload build log on failure ───────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: build.log
          retention-days: 7

      # ── 8. Find and show all .app files ──────────────────────────
      - name: Find .app files
        id: find_app
        run: |
          echo "=== Searching for .app files ==="
          find . -name "*.app" -type d 2>/dev/null || true
          echo "=== Searching in common locations ==="
          ls -la build/Release/ 2>/dev/null || echo "No build/Release/"
          ls -la MacPotPlayer.build/ 2>/dev/null || echo "No MacPotPlayer.build/"
          ls -la build/ 2>/dev/null || echo "No build/"

      # ── 9. Locate built .app ──────────────────────────────────────
      - name: Locate built app
        id: locate
        run: |
          # 尝试多个可能的路径
          POSSIBLE_PATHS=(
            "build/Release/MacPotPlayer.app"
            "MacPotPlayer.build/Release/MacPotPlayer.app"
            "$(find . -name 'MacPotPlayer.app' -type d 2>/dev/null | head -1)"
          )
          
          for APP_PATH in "${POSSIBLE_PATHS[@]}"; do
            if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
              echo "Found app at: $APP_PATH"
              echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          
          echo "ERROR: MacPotPlayer.app not found!"
          echo "=== Debug: List all files ==="
          ls -laR . | head -100
          exit 1

      # ── 10. Upload .app as artifact ───────────────────────────────
      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacPotPlayer-Release
          path: "${{ steps.locate.outputs.APP_PATH }}"
          retention-days: 7

      # ── 11. Create DMG ────────────────────────────────────────────
      - name: Create DMG
        run: |
          APP_PATH="${{ steps.locate.outputs.APP_PATH }}"
          VERSION="${{ env.VERSION }}"
          FINAL_DMG="MacPotPlayer_${VERSION}_macOS.dmg"

          hdiutil create \
            -volname "MacPotPlayer ${VERSION}" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "/tmp/${FINAL_DMG}"

          mv "/tmp/${FINAL_DMG}" "./${FINAL_DMG}"
          ls -lh "${FINAL_DMG}"

      # ── 12. Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            MacPotPlayer_*.dmg
          body: |
            ## MacPotPlayer ${{ env.VERSION }} 🎬

            A native macOS video player inspired by PotPlayer.

            ### Features
            - 360° VR Video Support
            - FFmpeg-powered decoding with hardware acceleration
            - Advanced subtitle rendering (SRT, ASS/SSA, VTT)
            - 10-band audio equalizer
            - Screenshot capture

            ### Installation
            1. Download the `.dmg` file below
            2. Open and drag **MacPotPlayer** to Applications
            3. On first launch, right-click → **Open**

            ### Requirements
            - macOS 14.0 (Sonoma) or later
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
