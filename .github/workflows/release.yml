name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  XCODE_VERSION: "15.3"

jobs:
  release:
    name: Release Build & Package
    runs-on: macos-14

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Export version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ── 2. Select Xcode ──────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.3.app
          xcodebuild -version

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          brew install xcodegen
          brew install ffmpeg
          brew install libass
          echo "=== FFmpeg ==="
          ls $(brew --prefix)/include/libavcodec/ || echo "FFmpeg headers not found!"
          echo "=== libass ==="
          ls $(brew --prefix)/include/ass/ || echo "libass headers not found!"

      # ── 4. Patch Info.plist with version ─────────────────────────
      - name: Patch version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" Resources/Info.plist

      # ── 5. Generate Xcode project ────────────────────────────────
      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la *.xcodeproj || echo "Xcode project not found!"

      # ── 6. Debug list workspace ─────────────────────────────────
      - name: Debug list workspace
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo "=== Resources directory ==="
          ls -la Resources/

      # ── 7. Build Release ─────────────────────────────────────────
      - name: Build Release
        id: build
        run: |
          set -o pipefail

          echo "=== Starting build ==="
          xcodebuild \
            -project MacPotPlayer.xcodeproj \
            -scheme MacPotPlayer \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$(brew --prefix)/include" \
            LIBRARY_SEARCH_PATHS="$(brew --prefix)/lib" \
            SWIFT_INCLUDE_PATHS="$(brew --prefix)/include" \
            OTHER_LDFLAGS="-lavcodec -lavformat -lavutil -lswscale -lswresample -lass -lpthread" \
            2>&1 | tee build.log

          BUILD_STATUS=${PIPESTATUS[0]}
          echo "=== Build exit status: $BUILD_STATUS ==="

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "BUILD FAILED with exit code $BUILD_STATUS"
            echo "=== Last 100 lines of build.log ==="
            tail -100 build.log
            exit 1
          fi

          echo "BUILD SUCCEEDED"

      # ── 8. Debug list build output ──────────────────────────────
      - name: Debug list build output
        run: |
          echo "=== Build directory structure ==="
          find build/ -type f -name "*.app" 2>/dev/null
          ls -laR build/ 2>/dev/null | head -100

      # ── 9. Upload build log on failure ───────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: build.log
          retention-days: 7

      # ── 10. Find and locate .app ─────────────────────────────────
      - name: Find and locate .app
        id: locate
        run: |
          echo "=== Searching for .app files ==="
          APP_PATH=$(find . -name "MacPotPlayer.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: MacPotPlayer.app not found!"
            echo "=== Debug check common locations ==="
            ls -la build/Build/Products/Release/ 2>/dev/null || echo "No Release folder"
            ls -la build/Build/Products/Debug/ 2>/dev/null || echo "No Debug folder"
            ls -la build/ 2>/dev/null || echo "No build folder"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT

      # ── 11. Upload .app as artifact ───────────────────────────────
      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacPotPlayer-Release
          path: "${{ steps.locate.outputs.APP_PATH }}"
          retention-days: 7

      # ── 12. Create DMG ────────────────────────────────────────────
      - name: Create DMG
        run: |
          APP_PATH="${{ steps.locate.outputs.APP_PATH }}"
          VERSION="${{ env.VERSION }}"
          FINAL_DMG="MacPotPlayer_${VERSION}_macOS.dmg"

          echo "Creating DMG from: $APP_PATH"
          ls -la "$APP_PATH"

          hdiutil create \
            -volname "MacPotPlayer ${VERSION}" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "/tmp/${FINAL_DMG}"

          mv "/tmp/${FINAL_DMG}" "./${FINAL_DMG}"
          ls -lh "${FINAL_DMG}"

      # ── 13. Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            MacPotPlayer_*.dmg
          body: |
            ## MacPotPlayer ${{ env.VERSION }} 🎬

            A native macOS video player inspired by PotPlayer.

            ### Features
            - 360° VR Video Support
            - FFmpeg-powered decoding with hardware acceleration
            - Advanced subtitle rendering (SRT, ASS/SSA, VTT)
            - 10-band audio equalizer
            - Screenshot capture

            ### Installation
            1. Download the `.dmg` file below
            2. Open and drag **MacPotPlayer** to Applications
            3. On first launch, right-click → **Open**

            ### Requirements
            - macOS 14.0 (Sonoma) or later
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
